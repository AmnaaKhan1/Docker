version: '3.8'

services:
  web:
    # Build from Dockerfile in the repo
    build:
      context: ./app
      dockerfile: Dockerfile
    
    container_name: web-pipeline
    
    # Different port for pipeline (not 3000)
    ports:
      - "3001:3000"
    
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_USER=postgres
      - DB_PASSWORD=pipeline_password123
      - DB_HOST=db-pipeline
      - DB_PORT=5432
      - DB_NAME=pipeline_db
    
    depends_on:
      db:
        condition: service_healthy
    
    networks:
      - pipeline-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    
    container_name: postgres-pipeline
    
    # Different port for pipeline (not 5432)
    ports:
      - "5433:5432"
    
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pipeline_password123
      - POSTGRES_DB=pipeline_db
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.UTF-8
    
    volumes:
      - pipeline_db_data:/var/lib/postgresql/data
    
    networks:
      - pipeline-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pipeline_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  pipeline-network:
    driver: bridge

volumes:
  pipeline_db_data:
    driver: local